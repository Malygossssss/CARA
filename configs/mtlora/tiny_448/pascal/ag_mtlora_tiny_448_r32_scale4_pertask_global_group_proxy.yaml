DATA:
  IMG_SIZE: 448
MODEL:
  TYPE: swin
  NAME: ag_mtlora_tiny_448_r32_scale4_pertask_global_group_proxy
  DROP_PATH_RATE: 0.2
  SWIN:
    EMBED_DIM: 96
    DEPTHS: [2, 2, 6, 2]
    NUM_HEADS: [3, 6, 12, 24]
    WINDOW_SIZE: 7
  MTLORA:
    ENABLED: True
    R: [32, 32, 32, 32]
    SHARED_SCALE: [4.0]
    TASK_SCALE: [4.0]
    DROPOUT: [0.05, 0.05, 0.05, 0.05]
    TRAINABLE_SCALE_SHARED: False
    TRAINABLE_SCALE_PER_TASK: False
    INTERMEDIATE_SPECIALIZATION: False
    FREEZE_PRETRAINED: True
    SPLIT_QKV: False
    QKV_ENABLED: True
    PROJ_ENABLED: True
    FC1_ENABLED: True
    FC2_ENABLED: True
    DOWNSAMPLER_ENABLED: False
    R_PER_TASK:
      semseg: [4]
      normals: [4]
      sal: [4]
      human_parts: [4]
      edge: [4]
      depth: [4]
      shared: [32]
  AGMTLORA:
    ENABLED: True
    STAGE: 1
    DATA_SPLIT_MODE: train_meta_strict
    META_VAL_RATIO: 0.2
    PARTITION_GRANULARITY: global
    SEARCH_SCORE_SOURCE: group_proxy
    MAX_GROUPS: 2
    TOTAL_SHARED_RANK_BUDGET: 32
    GROUP_RANK_ALLOCATION: equal_split
    GROUPING_SOURCE: search
    AFFINITY_WARMUP_EPOCHS: 5
    AFFINITY_SCORE_EPOCHS: 50
    SEARCH_OBJECTIVE: mean_group_proxy
    PREDICTOR_TRAIN_GROUP_BUDGET: 10
    PREDICTOR_TRAIN_GROUP_STRATEGY: all_singletons+all_pairs+random_higher_order
    PREDICTOR_GROUP_TRAIN_EPOCHS: 5
    BASE_PREDICTOR: spline_ridge
    BASE_PREDICTOR_KWARGS:
      degree: 3
      n_knots: 4
      alpha: 1.0
    RESIDUAL_PREDICTOR: ridge
    RESIDUAL_ALPHA: 1.0
    VISUALIZE_SYMMETRIC_AFFINITY: True
  DECODER_HEAD:
    semseg: hrnet
    normals: hrnet
    sal: hrnet
    human_parts: hrnet
    edge: hrnet
    depth: hrnet
